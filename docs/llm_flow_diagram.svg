<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="780" viewBox="0 0 1000 780" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1000" height="780" fill="#0b1220"/>

  <!-- Title -->
  <text x="500" y="40" fill="#e2e8f0" font-size="26" font-weight="bold" text-anchor="middle">Jarvis — LLM Provider Failover Chain</text>
  <text x="500" y="66" fill="#94a3b8" font-size="14" text-anchor="middle">agents/models.js  ·  callGemma4()</text>

  <!-- Entry -->
  <rect x="400" y="95" width="200" height="48" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="118" fill="#c7d2fe" font-size="15" font-weight="bold" text-anchor="middle">Agent request</text>
  <text x="500" y="135" fill="#94a3b8" font-size="11" text-anchor="middle">(userMessage, useLocal, ...)</text>

  <!-- Decision -->
  <path d="M500,143 L500,175" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="500,180 660,235 500,290 340,235" fill="#172033" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="228" fill="#fcd34d" font-size="13" font-weight="bold" text-anchor="middle">useLocal == true</text>
  <text x="500" y="248" fill="#fcd34d" font-size="13" font-weight="bold" text-anchor="middle">AND OLLAMA_URL set?</text>

  <!-- YES branch -> Ollama -->
  <path d="M340,235 L210,235 L210,330" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="262" y="225" fill="#10b981" font-size="13" font-weight="bold" text-anchor="middle">YES</text>

  <!-- Ollama box (LOCAL) -->
  <rect x="90" y="335" width="240" height="120" rx="12" fill="#06281d" stroke="#10b981" stroke-width="2.5"/>
  <text x="210" y="365" fill="#6ee7b7" font-size="17" font-weight="bold" text-anchor="middle">🖥️  1. Ollama</text>
  <text x="210" y="390" fill="#a7f3d0" font-size="13" text-anchor="middle">model: gemma4:e4b</text>
  <text x="210" y="412" fill="#cbd5e1" font-size="12" text-anchor="middle">LOCAL — runs on your machine</text>
  <text x="210" y="432" fill="#cbd5e1" font-size="12" text-anchor="middle">timeout 15s · no cost · private</text>
  <text x="210" y="449" fill="#fbbf24" font-size="11.5" font-weight="bold" text-anchor="middle">returns immediately — no fallback</text>

  <!-- NO branch -> Groq -->
  <path d="M660,235 L790,235 L790,330" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="730" y="225" fill="#94a3b8" font-size="13" font-weight="bold" text-anchor="middle">NO</text>

  <!-- CLOUD zone label -->
  <rect x="560" y="320" width="400" height="430" rx="14" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="760" y="342" fill="#64748b" font-size="13" font-weight="bold" text-anchor="middle">☁️  CLOUD PROVIDERS</text>

  <!-- Groq -->
  <rect x="620" y="355" width="280" height="80" rx="12" fill="#13233b" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="760" y="382" fill="#93c5fd" font-size="16" font-weight="bold" text-anchor="middle">☁️  2. Groq  (primary)</text>
  <text x="760" y="404" fill="#cbd5e1" font-size="12.5" text-anchor="middle">llama-3.3-70b-versatile</text>
  <text x="760" y="423" fill="#94a3b8" font-size="11.5" text-anchor="middle">free · fast · timeout 7s · OpenAI-compat</text>

  <!-- fail arrow Groq->DeepSeek -->
  <path d="M760,435 L760,470" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="830" y="458" fill="#f87171" font-size="11.5" font-weight="bold" text-anchor="middle">on fail ↓</text>

  <!-- DeepSeek -->
  <rect x="620" y="475" width="280" height="80" rx="12" fill="#13233b" stroke="#3b82f6" stroke-width="2"/>
  <text x="760" y="502" fill="#93c5fd" font-size="16" font-weight="bold" text-anchor="middle">☁️  3. DeepSeek  (fallback)</text>
  <text x="760" y="524" fill="#cbd5e1" font-size="12.5" text-anchor="middle">deepseek-chat</text>
  <text x="760" y="543" fill="#94a3b8" font-size="11.5" text-anchor="middle">timeout 9s · OpenAI-compat</text>

  <!-- fail arrow DeepSeek->Gemini -->
  <path d="M760,555 L760,590" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="830" y="578" fill="#f87171" font-size="11.5" font-weight="bold" text-anchor="middle">on fail ↓</text>

  <!-- Gemini -->
  <rect x="620" y="595" width="280" height="95" rx="12" fill="#2a1733" stroke="#a855f7" stroke-width="2.5"/>
  <text x="760" y="622" fill="#d8b4fe" font-size="16" font-weight="bold" text-anchor="middle">☁️  4. Gemini  (last resort)</text>
  <text x="760" y="644" fill="#cbd5e1" font-size="12.5" text-anchor="middle">gemini-2.5-flash-lite</text>
  <text x="760" y="663" fill="#94a3b8" font-size="11.5" text-anchor="middle">Google API (not OpenAI-compat)</text>
  <text x="760" y="681" fill="#94a3b8" font-size="11.5" text-anchor="middle">role-preserving payload · timeout 15s</text>

  <!-- Output node -->
  <rect x="90" y="500" width="240" height="55" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="210" y="525" fill="#6ee7b7" font-size="15" font-weight="bold" text-anchor="middle">✓  answer → user</text>
  <text x="210" y="544" fill="#94a3b8" font-size="11" text-anchor="middle">+ TTS audio (optional)</text>

  <!-- arrows to output -->
  <path d="M210,455 L210,500" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M620,640 L360,640 L360,545 L330,535" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="430" y="632" fill="#10b981" font-size="11" text-anchor="middle">first success wins</text>

  <!-- Special-purpose side note -->
  <rect x="90" y="600" width="450" height="95" rx="12" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="110" y="624" fill="#fcd34d" font-size="13.5" font-weight="bold">⚡ Bypass the chain — Gemini-only paths:</text>
  <text x="110" y="648" fill="#cbd5e1" font-size="12">• callGeminiWithSearch()  → news / weather / sports (Google grounding)</text>
  <text x="110" y="668" fill="#cbd5e1" font-size="12">• callGeminiVision()  → image + text (multimodal, max 10MB)</text>
  <text x="110" y="688" fill="#94a3b8" font-size="11.5">• callGemma4Stream()  → /stream-jarvis (same chain, SSE)</text>

  <!-- footer -->
  <text x="500" y="735" fill="#475569" font-size="11.5" text-anchor="middle">temperature 0.5 · top_p 0.9 — pinned across ALL providers for consistent Hebrew style</text>
</svg>
