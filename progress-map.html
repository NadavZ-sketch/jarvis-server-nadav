<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jarvis — לוח ניהול</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--card:#273449;--border:#334155;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#6366f1;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 20px 60px}
a{color:inherit;text-decoration:none}

/* ── layout ── */
.container{max-width:960px;margin:0 auto}
h1{font-size:1.6rem;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);font-size:.85rem;margin-bottom:24px}

/* ── status bar ── */
.status-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 18px;margin-bottom:20px;font-size:.83rem}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.dot.red{background:var(--red)}
.dot.loading{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.sep{width:1px;height:18px;background:var(--border)}
.muted{color:var(--muted)}

/* ── metrics ── */
.metrics{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;text-align:center;flex:1;min-width:100px;position:relative}
.metric .live-dot{position:absolute;top:8px;left:8px;width:7px;height:7px;
  border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.metric-num{font-size:1.8rem;font-weight:700;color:var(--blue);line-height:1}
.metric-label{color:var(--text);font-size:.8rem;font-weight:600;margin-bottom:4px}
.metric-sub{color:var(--muted);font-size:.72rem;margin-top:4px}

/* ── section ── */
.section-title{display:flex;align-items:center;gap:8px;font-size:.78rem;
  font-weight:700;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;
  margin:28px 0 12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── feature board ── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px}
@media(max-width:640px){.board{grid-template-columns:1fr}}
.col-header{font-size:.8rem;font-weight:700;padding:8px 14px;border-radius:8px;
  display:flex;align-items:center;gap:7px;margin-bottom:8px}
.col-header.done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.col-header.building{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.col-header.planned{background:rgba(107,114,128,.12);color:var(--muted);border:1px solid rgba(107,114,128,.25)}
.feature-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:.83rem;margin-bottom:6px;cursor:default;
  transition:transform .12s,box-shadow .12s}
.feature-pill:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.feature-pill .fname{font-weight:600}
.feature-pill .fdesc{color:var(--muted);font-size:.72rem;margin-top:2px;line-height:1.4}
.badge{display:inline-block;font-size:.65rem;font-weight:700;border-radius:4px;
  padding:2px 7px;letter-spacing:.3px;margin-bottom:5px}
.badge.done{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge.building{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.badge.planned{background:rgba(107,114,128,.15);color:var(--muted);border:1px solid rgba(107,114,128,.3)}

/* ── backlog ── */
.backlog-add{display:flex;gap:8px;margin-bottom:14px}
.backlog-add input{flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;direction:rtl}
.backlog-add input:focus{border-color:var(--accent)}
.backlog-add button{background:var(--accent);border:none;border-radius:8px;
  padding:10px 18px;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:opacity .15s}
.backlog-add button:hover{opacity:.85}
.backlog-list{display:flex;flex-direction:column;gap:6px}
.backlog-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;display:flex;align-items:center;gap:10px;transition:opacity .2s}
.backlog-item.done-item{opacity:.45}
.backlog-item.done-item .item-text{text-decoration:line-through}
.check-btn{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);
  background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:.8rem;transition:all .15s}
.check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
.item-text{flex:1;font-size:.88rem}
.item-meta{color:var(--muted);font-size:.72rem;flex-shrink:0}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:.9rem;padding:2px 6px;border-radius:4px;line-height:1;transition:color .12s}
.del-btn:hover{color:var(--red)}
.backlog-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:20px}

/* ── features edit hint ── */
.edit-hint{color:var(--muted);font-size:.75rem;margin-top:8px;text-align:center}
.edit-hint code{background:var(--card);border-radius:4px;padding:1px 6px;font-size:.72rem}

/* ── refresh row ── */
.refresh-row{color:var(--muted);font-size:.74rem;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">

<h1>🤖 <span>Jarvis</span> — לוח ניהול</h1>
<p class="subtitle" id="subtitle">טוען...</p>

<!-- SERVER STATUS -->
<div class="status-bar">
  <div class="dot loading" id="sdot"></div>
  <span id="stext">בודק שרת...</span>
  <div class="sep"></div>
  <span class="muted" id="slat">—</span>
  <div class="sep"></div>
  <span class="muted" id="stime">—</span>
</div>

<!-- LIVE METRICS -->
<div class="section-title">📡 נתונים חיים</div>
<div class="metrics" id="metricsRow">
  <div class="metric"><div class="live-dot"></div><div class="metric-label">שיחות</div><div class="metric-num" id="m-chat">—</div><div class="metric-sub" id="m-chat-sub">טוען</div></div>
  <div class="metric"><div class="live-dot"></div><div class="metric-label">משימות</div><div class="metric-num" id="m-tasks">—</div><div class="metric-sub" id="m-tasks-sub">—</div></div>
  <div class="metric"><div class="live-dot"></div><div class="metric-label">תזכורות</div><div class="metric-num" id="m-rem">—</div><div class="metric-sub" id="m-rem-sub">—</div></div>
  <div class="metric"><div class="live-dot"></div><div class="metric-label">זיכרונות</div><div class="metric-num" id="m-mem">—</div><div class="metric-sub">long-term</div></div>
  <div class="metric"><div class="live-dot"></div><div class="metric-label">פתקים</div><div class="metric-num" id="m-notes">—</div><div class="metric-sub">notes</div></div>
</div>
<div class="refresh-row">מתעדכן כל 30 שניות · <span id="last-refresh">—</span></div>

<!-- FEATURE BOARD -->
<div class="section-title">🗂️ סטטוס יכולות</div>
<div class="board" id="board">
  <div><div class="col-header done">✅ <span id="done-count">—</span> הושלם</div><div id="col-done"></div></div>
  <div><div class="col-header building">🔨 <span id="building-count">—</span> בבנייה</div><div id="col-building"></div></div>
  <div><div class="col-header planned">📋 <span id="planned-count">—</span> מתוכנן</div><div id="col-planned"></div></div>
</div>
<p class="edit-hint">לעדכון הרשימה — ערוך <code>features.json</code> בשרת</p>

<!-- BACKLOG -->
<div class="section-title">📌 Backlog — מה עובד על הפרויקט</div>
<div class="backlog-add">
  <input id="backlogInput" placeholder="הוסף משימה או רעיון לפרויקט..." />
  <button onclick="addBacklogItem()">הוסף</button>
</div>
<div class="backlog-list" id="backlogList">
  <div class="backlog-empty">טוען...</div>
</div>

</div><!-- /container -->

<script>
// ── Server health ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const t0  = Date.now();
    const res = await fetch('/health', { signal: AbortSignal.timeout(4000) });
    const ms  = Date.now() - t0;
    const d   = await res.json();
    document.getElementById('sdot').className  = 'dot green';
    document.getElementById('stext').textContent = '● שרת פעיל';
    document.getElementById('slat').textContent  = `זמן תגובה: ${ms}ms`;
    document.getElementById('stime').textContent = `עודכן: ${new Date().toLocaleTimeString('he-IL')}`;
  } catch {
    document.getElementById('sdot').className  = 'dot red';
    document.getElementById('stext').textContent = '● שרת לא זמין';
  }
}

// ── Live metrics ───────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await fetch('/stats', { signal: AbortSignal.timeout(6000) }).then(r => r.json());
    const s = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ?? '—'; };
    s('m-chat',     d.chat?.total);
    s('m-chat-sub', `${d.chat?.today ?? 0} היום`);
    s('m-tasks',    d.tasks?.total);
    s('m-tasks-sub',`${d.tasks?.total - d.tasks?.done ?? 0} פתוחות`);
    s('m-rem',      d.reminders?.total);
    s('m-rem-sub',  `${d.reminders?.active ?? 0} פעילות`);
    s('m-mem',      d.memories?.total);
    s('m-notes',    d.notes?.total);
    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('he-IL');
  } catch { document.getElementById('last-refresh').textContent = 'שגיאת טעינה'; }
}

// ── Feature board ──────────────────────────────────────────────────────────────
function pill(f, status) {
  return `<div class="feature-pill">
    <span class="badge ${status}">${status==='done'?'✅ הושלם':status==='building'?'🔨 בבנייה':'📋 מתוכנן'}</span>
    <div class="fname">${f.name}</div>
    <div class="fdesc">${f.desc}</div>
  </div>`;
}

async function loadFeatures() {
  try {
    const d = await fetch('/dashboard/features').then(r => r.json());
    const done     = d.features?.done     || [];
    const building = d.features?.building || [];
    const planned  = d.features?.planned  || [];

    document.getElementById('done-count').textContent     = done.length;
    document.getElementById('building-count').textContent = building.length;
    document.getElementById('planned-count').textContent  = planned.length;

    document.getElementById('col-done').innerHTML     = done.map(f => pill(f,'done')).join('');
    document.getElementById('col-building').innerHTML = building.map(f => pill(f,'building')).join('');
    document.getElementById('col-planned').innerHTML  = planned.map(f => pill(f,'planned')).join('');

    document.getElementById('subtitle').textContent =
      `עוזר אישי AI · ${done.length} יכולות פעילות · עודכן: ${d.lastUpdated || '—'}`;
  } catch {
    document.getElementById('subtitle').textContent = 'לא ניתן לטעון features.json';
  }
}

// ── Backlog ────────────────────────────────────────────────────────────────────
async function loadBacklog() {
  try {
    const d = await fetch('/dashboard/backlog').then(r => r.json());
    renderBacklog(d.items || []);
  } catch { document.getElementById('backlogList').innerHTML = '<div class="backlog-empty">⚠️ לא ניתן לטעון backlog</div>'; }
}

function renderBacklog(items) {
  const list = document.getElementById('backlogList');
  if (!items.length) { list.innerHTML = '<div class="backlog-empty">אין פריטים — הוסף רעיון או משימה</div>'; return; }
  list.innerHTML = items.map(item => `
    <div class="backlog-item ${item.done ? 'done-item' : ''}" id="bi-${item.id}">
      <button class="check-btn ${item.done ? 'checked' : ''}" onclick="toggleItem(${item.id})">${item.done ? '✓' : ''}</button>
      <span class="item-text">${item.text}</span>
      <span class="item-meta">${item.added || ''}</span>
      <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
    </div>`).join('');
}

async function addBacklogItem() {
  const input = document.getElementById('backlogInput');
  const text  = input.value.trim();
  if (!text) return;
  try {
    const d = await fetch('/dashboard/backlog', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    }).then(r => r.json());
    input.value = '';
    await loadBacklog();
  } catch { alert('שגיאה בהוספה'); }
}

async function toggleItem(id) {
  try {
    await fetch(`/dashboard/backlog/${id}`, { method: 'PATCH' });
    await loadBacklog();
  } catch {}
}

async function deleteItem(id) {
  try {
    await fetch(`/dashboard/backlog/${id}`, { method: 'DELETE' });
    await loadBacklog();
  } catch {}
}

// Enter key on backlog input
document.getElementById('backlogInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addBacklogItem();
});

// ── Auto-refresh ───────────────────────────────────────────────────────────────
checkHealth();
loadStats();
loadFeatures();
loadBacklog();
setInterval(() => { checkHealth(); loadStats(); }, 30000);
</script>
</body>
</html>
