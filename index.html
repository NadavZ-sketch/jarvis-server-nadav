<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyAssistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a4a;
    }

    header h1 { font-size: 20px; color: #7c6af7; }
    header .provider { font-size: 12px; color: #888; margin-right: auto; }
    .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; }
    /* מצב בהיר */
    body.light-mode {
      background: #f0f0f5;
      color: #111;
    }
    body.light-mode header { background: #e0e0f0; border-color: #ccc; }
    body.light-mode .tabs { background: #e0e0f0; border-color: #ccc; }
    body.light-mode .message.assistant { background: #e8e8f8; border-color: #ccc; color: #111; }
    body.light-mode .message.user { background: #7c6af7; color: #fff; }
    body.light-mode input[type="text"] { background: #fff; border-color: #ccc; color: #111; }
    body.light-mode .input-area { background: #e0e0f0; border-color: #ccc; }
    body.light-mode .settings-group { background: #e8e8f8; border-color: #ccc; }
    body.light-mode .task-item { background: #e8e8f8; border-color: #ccc; }
    body.light-mode .mic-btn { background: #e8e8f8; border-color: #ccc; }

    .tabs {
      display: flex;
      flex-direction: row;
      gap: 8px;
      padding: 10px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      align-items: center;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab.active { background: #7c6af7; color: #fff; }
    .tab.danger { color: #f44; margin-right: auto; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-container.hidden { display: none; }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes typingDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .message.user {
      background: linear-gradient(135deg, #7c6af7, #9b8bff);
      align-self: flex-start;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(124, 106, 247, 0.3);
      animation: slideInRight 0.3s ease;
    }

    .message.assistant {
      background: linear-gradient(135deg, #1e1e3a, #252545);
      align-self: flex-end;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a4a;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: slideInLeft 0.3s ease;
    }

    .intent-badge { font-size: 11px; color: #888; margin-top: 6px; }
    .msg-time { font-size: 10px; color: #666; margin-top: 4px; text-align: left; }

    .typing {
      background: linear-gradient(135deg, #1e1e3a, #252545);
      align-self: flex-end;
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid #2a2a4a;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #7c6af7;
      border-radius: 50%;
      animation: typingDot 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
   

    .input-area {
      padding: 16px 24px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 24px;
      padding: 12px 20px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: #7c6af7; }

    button {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 24px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #6a5ae0; }
    button:disabled { background: #444; cursor: not-allowed; }

    .mic-btn {
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .mic-btn.recording { background: #f44; border-color: #f44; animation: pulse 1s infinite; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Tasks */
    .tasks-panel, .settings-panel {
      display: none;
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      flex-direction: column;
      gap: 16px;
    }

    .tasks-panel.active, .settings-panel.active { display: flex; }

    .add-task-area {
      display: flex;
      gap: 8px;
    }

    .add-task-area input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 10px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .add-task-area button { padding: 10px 20px; font-size: 14px; border-radius: 12px; }

    .task-item {
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .task-item.completed { opacity: 0.5; }
    .task-item.completed .task-title { text-decoration: line-through; }
    .task-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #7c6af7; }
    .task-title { flex: 1; font-size: 15px; }
    .task-delete { background: transparent; color: #f44; padding: 4px 10px; font-size: 13px; border-radius: 8px; }
    .task-delete:hover { background: #f443362a; }

    /* Settings */
    .settings-group {
      background: #1e1e3a;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-group h3 { font-size: 14px; color: #7c6af7; margin-bottom: 4px; }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setting-item label { font-size: 13px; color: #aaa; }

    .setting-item select, .setting-item input[type="text"] {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
      width: 100%;
    }

    .save-btn {
      background: #7c6af7;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      width: 100%;
    }

    .setting-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #7c6af7;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot"></div>
  <h1 id="assistant-name">🤖 MyAssistant</h1>
  <span class="provider" id="provider-label">טוען...</span>
  <button id="theme-btn" onclick="toggleTheme()" style="background:transparent; border:1px solid #2a2a4a; border-radius:50%; width:36px; height:36px; padding:0; font-size:18px;">☀️</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('chat')">💬 צ'אט</div>
  <div class="tab" onclick="switchTab('tasks')">✅ משימות</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ הגדרות</div>
  <div class="tab danger" onclick="clearChat()">🗑️ נקה</div>
</div>

<div class="chat-container" id="chat-container">
  <div class="message assistant">
    שלום! אני MyAssistant, העוזר האישי החכם שלך 👋<br/>
    איך אוכל לעזור לך היום?
  </div>
</div>

<div class="tasks-panel" id="tasks-panel">
  <div class="add-task-area">
    <input type="text" id="new-task-input" placeholder="משימה חדשה..." />
    <button onclick="addTask()">+ הוסף</button>
  </div>
  <div id="tasks-list"></div>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-group">
    <h3>🤖 מודל שפה</h3>
    <div class="setting-item">
      <label>ספק</label>
      <select id="setting-provider">
        <option value="groq">Groq (חינמי מהיר)</option>
        <option value="openai">OpenAI (GPT-4)</option>
        <option value="anthropic">Anthropic (Claude)</option>
      </select>
    </div>
  </div>

  <div class="settings-group">
    <h3>🎭 אישיות</h3>
    <div class="setting-item">
      <label>סגנון דיבור</label>
      <select id="setting-personality">
        <option value="default">ידידותי ומקצועי</option>
        <option value="formal">רשמי ומכובד</option>
        <option value="casual">שיחותי וכיפי</option>
      </select>
    </div>
  </div>

  <div class="settings-group">
    <h3>✏️ שם העוזרת</h3>
    <div class="setting-item">
      <label>שם</label>
      <input type="text" id="setting-name" placeholder="MyAssistant" />
    </div>
  </div>

  <div class="settings-group">
    <h3>🔔 התראות</h3>
    <div class="setting-item">
      <div class="setting-row">
        <input type="checkbox" id="setting-notifications" />
        <label for="setting-notifications">אפשר התראות דפדפן</label>
      </div>
    </div>
  </div>

  <button class="save-btn" onclick="saveSettings()">💾 שמור הגדרות</button>
</div>

<div class="input-area" id="input-area">
  <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="קלט קולי">🎤</button>
  <input type="text" id="message-input" placeholder="כתוב הודעה או לחץ על המיקרופון..." onkeydown="handleKey(event)" />
  <button id="send-btn" onclick="sendMessage()">שלח ➤</button>
</div>

<script>
  const API = 'http://localhost:3000';
  let isRecording = false;
  let recognition = null;
  let currentSettings = {};

  // בדיקת סטטוס
  async function checkStatus() {
    try {
      const res = await fetch(`${API}/status`);
      const data = await res.json();
      document.getElementById('provider-label').textContent = `🤖 ${data.provider}`;
    } catch {
      document.getElementById('provider-label').textContent = '❌ לא מחובר';
    }
  }

  // טעינת הגדרות
  async function loadSettings() {
    try {
      const res = await fetch(`${API}/settings`);
      const data = await res.json();
      currentSettings = data.settings;

      document.getElementById('setting-provider').value = currentSettings.provider || 'groq';
      document.getElementById('setting-personality').value = currentSettings.personality || 'default';
      document.getElementById('setting-name').value = currentSettings.assistantName || 'MyAssistant';

      if (currentSettings.assistantName) {
        document.getElementById('assistant-name').textContent = `🤖 ${currentSettings.assistantName}`;
      }

      const notifEnabled = localStorage.getItem('notifications_enabled') === 'true';
      document.getElementById('setting-notifications').checked = notifEnabled;
    } catch (e) {
      console.error('שגיאה בטעינת הגדרות', e);
    }
  }

  // שמירת הגדרות
  async function saveSettings() {
    const provider = document.getElementById('setting-provider').value;
    const personality = document.getElementById('setting-personality').value;
    const assistantName = document.getElementById('setting-name').value || 'MyAssistant';
    const notifications = document.getElementById('setting-notifications').checked;

    try {
      await fetch(`${API}/settings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider, personality, assistantName, language: 'he' }),
      });

      document.getElementById('assistant-name').textContent = `🤖 ${assistantName}`;
      localStorage.setItem('notifications_enabled', notifications);

      if (notifications) {
        await requestNotifications();
      }

      alert('✅ ההגדרות נשמרו! יש להפעיל מחדש את השרת לשינוי הספק.');
    } catch (e) {
      alert('❌ שגיאה בשמירת הגדרות');
    }
  }

  // התראות
  async function requestNotifications() {
    if (!('Notification' in window)) {
      alert('הדפדפן שלך לא תומך בהתראות');
      return;
    }
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      new Notification('MyAssistant', {
        body: 'התראות הופעלו בהצלחה! 🎉',
        icon: '🤖',
      });
    }
  }

  function sendNotification(title, body) {
    if (localStorage.getItem('notifications_enabled') === 'true' && Notification.permission === 'granted') {
      new Notification(title, { body });
    }
  }

  // קלט קולי
  function toggleVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('הדפדפן שלך לא תומך בקלט קולי. נסה Chrome.');
      return;
    }

    if (isRecording) {
      recognition.stop();
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'he-IL';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('mic-btn').textContent = '⏹️';
      document.getElementById('message-input').placeholder = 'מקשיב...';
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      document.getElementById('message-input').value = transcript;
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      document.getElementById('mic-btn').textContent = '🎤';
      document.getElementById('message-input').placeholder = 'כתוב הודעה או לחץ על המיקרופון...';
    };

    recognition.start();
  }

  // החלפת טאב
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active',
        (i === 0 && tab === 'chat') ||
        (i === 1 && tab === 'tasks') ||
        (i === 2 && tab === 'settings')
      );
    });
    document.getElementById('chat-container').classList.toggle('hidden', tab !== 'chat');
    document.getElementById('tasks-panel').classList.toggle('active', tab === 'tasks');
    document.getElementById('settings-panel').classList.toggle('active', tab === 'settings');
    document.getElementById('input-area').style.display = tab === 'chat' ? 'flex' : 'none';
    if (tab === 'tasks') loadTasks();
    if (tab === 'settings') loadSettings();
  }

  // הודעות
  function addMessageToChat(role, text, intent = null) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const time = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = text.replace(/\n/g, '<br/>');
    if (intent && intent !== 'chat') {
      div.innerHTML += `<div class="intent-badge">כוונה: ${intent}</div>`;
    }
    div.innerHTML += `<div class="msg-time">${time}</div>`;
    document.getElementById('chat-container').appendChild(div);
    saveHistory();
    scrollToBottom();

    if (role === 'assistant') {
      const name = document.getElementById('assistant-name').textContent.replace('🤖 ', '');
      sendNotification(name, text.substring(0, 60) + '...');
    }
  }

  async function sendMessage() {
    const input = document.getElementById('message-input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    document.getElementById('send-btn').disabled = true;
    addMessageToChat('user', message);

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';
    typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    document.getElementById('chat-container').appendChild(typing);
    scrollToBottom();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      addMessageToChat('assistant', data.reply, data.intent);
    } catch {
      document.getElementById('typing')?.remove();
      addMessageToChat('assistant', '❌ שגיאה בחיבור לשרת');
    }

    document.getElementById('send-btn').disabled = false;
    scrollToBottom();
  }

  function scrollToBottom() {
    const container = document.getElementById('chat-container');
    container.scrollTop = container.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter') sendMessage();
  }

  function saveHistory() {
    const messages = [];
    document.querySelectorAll('.message').forEach(msg => {
      messages.push({
        role: msg.classList.contains('user') ? 'user' : 'assistant',
        html: msg.innerHTML,
      });
    });
    localStorage.setItem('chat_history', JSON.stringify(messages));
  }

  function loadHistory() {
    const saved = localStorage.getItem('chat_history');
    if (!saved) return;
    const messages = JSON.parse(saved);
    const container = document.getElementById('chat-container');
    container.innerHTML = '';
    messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.innerHTML = msg.html;
      container.appendChild(div);
    });
    scrollToBottom();
  }

  function clearChat() {
    if (!confirm('למחוק את כל השיחה?')) return;
    localStorage.removeItem('chat_history');
    document.getElementById('chat-container').innerHTML = `
      <div class="message assistant">
        שלום! אני MyAssistant, העוזר האישי החכם שלך 👋<br/>
        איך אוכל לעזור לך היום?
      </div>`;
  }

  // משימות
  async function loadTasks() {
    const res = await fetch(`${API}/tasks`);
    const data = await res.json();
    const list = document.getElementById('tasks-list');
    list.innerHTML = '';
    data.tasks.forEach(task => {
      const div = document.createElement('div');
      div.className = `task-item ${task.completed ? 'completed' : ''}`;
      div.innerHTML = `
        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="completeTask('${task.id}')" />
        <div style="flex:1"><div class="task-title">${task.title}</div></div>
        <button class="task-delete" onclick="deleteTask('${task.id}')">🗑️</button>
      `;
      list.appendChild(div);
    });
  }

  async function addTask() {
    const input = document.getElementById('new-task-input');
    const title = input.value.trim();
    if (!title) return;
    input.value = '';
    await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    loadTasks();
  }

  async function completeTask(id) {
    await fetch(`${API}/tasks/${id}/complete`, { method: 'PUT' });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    loadTasks();
  }

// מצב בהיר/כהה
  function toggleTheme() {
    const isDark = document.body.classList.toggle('light-mode');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  }

  function loadTheme() {
    const theme = localStorage.getItem('theme');
    if (theme === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('theme-btn').textContent = '🌙';
    }
  }

  checkStatus();
  loadHistory();
  loadTheme();

</script>
</body>
</html>ד
